<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Dark background -->
  <rect width="512" height="512" rx="96" fill="#1e1e1e"/>

  <!-- Color wheel: two halves split by S-curve -->
  <!-- Orange half (left/bottom) -->
  <defs>
    <clipPath id="orangeClip">
      <path d="M 0 0 L 220 0 Q 256 128 292 256 Q 328 384 512 512 L 0 512 Z"/>
    </clipPath>
    <clipPath id="tealClip">
      <path d="M 512 0 L 292 0 Q 256 128 220 256 Q 184 384 0 512 L 512 512 Z"/>
    </clipPath>
    <radialGradient id="wheelGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a2a2a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.5"/>
    </radialGradient>
  </defs>

  <!-- Orange side -->
  <g clip-path="url(#orangeClip)">
    <rect width="512" height="512" fill="#ff8c00"/>
    <circle cx="256" cy="256" r="180" fill="url(#wheelGrad)"/>
  </g>

  <!-- Teal side -->
  <g clip-path="url(#tealClip)">
    <rect width="512" height="512" fill="#00d4aa"/>
    <circle cx="256" cy="256" r="180" fill="url(#wheelGrad)"/>
  </g>

  <!-- S-curve boundary line (subtle highlight) -->
  <path d="M 220 0 Q 256 128 292 256 Q 328 384 512 512"
        fill="none" stroke="#1e1e1e" stroke-width="2" opacity="0.6"/>
  <path d="M 220 0 Q 256 128 292 256 Q 328 384 512 512"
        fill="none" stroke="#ffffff" stroke-width="1" opacity="0.2"/>

  <!-- Outer ring -->
  <rect x="4" y="4" width="504" height="504" rx="92" fill="none"
        stroke="#333" stroke-width="2"/>
</svg>